<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up</title>
</head>
<body>
    <div class="project_container">
        <h2 class="main_heading">Sign Up</h2>

        <p class="prompt_para">Create a new account:</p>

        <input type="text" class="date_input" placeholder="Username">

        <input type="email" class="date_input" placeholder="Email">

        <input type="password" class="date_input" placeholder="Password">

        <button class="fetch_result">Sign Up</button>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>

        <div class="result-text"></div>
    </div>
</body>
</html>
